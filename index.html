<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiderRP — Coming Soon</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #050505;
            overflow: hidden;
            font-family: sans-serif;
        }
        .background-pociemnienie {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color:rgba(0, 0, 0, 0.911);
            z-index: 2;
        }
        /* Kontener obrócony, żeby wszystko leciało na skos */
        #wall {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            transform: rotate(-15deg);
            display: flex;
            flex-direction: column;
        }

        /* Pojedynczy pasek z logami */
        .row {
            display: flex;
            white-space: nowrap;
            padding: 10px 0;
        }

        .logo-item {
            height: 120px; /* Wysokość Twoich lóg */
            margin: 0 40px; /* Odstęp między logami */
            opacity: 0.2;
            filter: grayscale(1);
        }

        /* Animacja przesuwania rzędu */
        .animate-right {
            animation: moveRight 10s linear infinite;
        }

        @keyframes moveRight {
            from { transform: translateX(-50%); }
            to { transform: translateX(0); }
        }

        .content {
            font-family: Arial, sans-serif;
            margin: 0;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin-bottom: 20px;
            color: #ccc;
        }

        .countdown {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }

        .box {
            font-size: 32px;
            font-weight: bold;
        }

        .label {
            font-size: 14px;
            color: #aaa;
        }

        .socials {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .socials a {
            color: #fff;
            font-size: 24px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="background-pociemnienie"></div>
    <div id="wall"></div>
    <div class="content">
    <h1>LiderRP</h1>
    <p>Startujemy już wkrótce!</p>
        <div class="countdown">
        <div>
            <div class="box" id="days">00</div>
            <div class="label">Dni</div>
        </div>
        <div>
            <div class="box" id="hours">00</div>
            <div class="label">Godziny</div>
        </div>
        <div>
            <div class="box" id="minutes">00</div>
            <div class="label">Minuty</div>
        </div>
        <div>
            <div class="box" id="seconds">00</div>
            <div class="label">Sekundy</div>
        </div>
    </div>    
        <div class="socials">
      <footer>Dołącz na discord: <a href="https://discord.gg/KKuvAW8qQc" style="color:inherit;text-decoration:underline">discord.gg/KKuvAW8qQc</a></footer>
    </div>
    </div>

    <script>
        // --- TWOJE LINKI TUTAJ ---
        const LOGO_URLS = [
            'https://cdn.liderrp.pl/v2/img/logo/liderbanicje.png',
            'https://cdn.liderrp.pl/v2/img/logo/liderlspd.png',
            'https://cdn.liderrp.pl/v2/img/logo/lidercrime.png',
            'https://cdn.liderrp.pl/v2/img/logo/lidercos.png',
            'https://cdn.liderrp.pl/v2/img/logo/liderems.png',
            'https://cdn.liderrp.pl/v2/img/logo/lidermedia.png',
            'https://cdn.liderrp.pl/v2/img/logo/liderfrakcyjna.png',
            'https://cdn.liderrp.pl/v2/img/logo/liderlogo.png',
        ];

        const wall = document.getElementById('wall');
        const rowsCount = 20; // Ile rzędów lóg

        for (let i = 0; i < rowsCount; i++) {
            const row = document.createElement('div');
            row.className = 'row animate-right';
            
            // Losujemy przesunięcie startowe dla każdego rzędu, żeby nie było nudno
            row.style.marginLeft = Math.random() * -500 + "px";
            row.style.animationDuration = (15 + Math.random() * 10) + "s";

            // Wypełniamy rząd logami (podwójnie, żeby pętla była płynna)
            let rowContent = "";
            for (let j = 0; j < 20; j++) {
                const url = LOGO_URLS[Math.floor(Math.random() * LOGO_URLS.length)];
                rowContent += `<img src="${url}" class="logo-item">`;
            }
            row.innerHTML = rowContent + rowContent; // Powielenie dla płynnego loopa
            
            wall.appendChild(row);
        }
    </script>
    <script>
        // Data startu — ustaw, jeśli chcesz
        const targetDate = new Date("2026-05-01T23:59:00");

        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;

            if (diff <= 0) return;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);

            document.getElementById("days").textContent = d.toString().padStart(2, "0");
            document.getElementById("hours").textContent = h.toString().padStart(2, "0");
            document.getElementById("minutes").textContent = m.toString().padStart(2, "0");
            document.getElementById("seconds").textContent = s.toString().padStart(2, "0");
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
